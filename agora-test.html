<!DOCTYPE html>
<html>
  <head>
    <title>Agora Connection Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      .status {
        padding: 15px;
        margin: 10px 0;
        border-radius: 5px;
      }
      .success {
        background: #d4edda;
        border: 1px solid #c3e6cb;
        color: #155724;
      }
      .error {
        background: #f8d7da;
        border: 1px solid #f5c6cb;
        color: #721c24;
      }
      .info {
        background: #d1ecf1;
        border: 1px solid #bee5eb;
        color: #0c5460;
      }
      button {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .test-btn {
        background: #007bff;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>🔬 Agora SDK Connection Test</h1>

    <div id="status"></div>

    <button class="test-btn" onclick="testConnection()">
      Test Agora Connection
    </button>
    <button class="test-btn" onclick="testCamera()">Test Camera Access</button>

    <h3>Console Output:</h3>
    <div
      id="console"
      style="
        background: #f8f9fa;
        padding: 15px;
        border-radius: 5px;
        font-family: monospace;
        height: 300px;
        overflow-y: scroll;
      "
    ></div>

    <script src="js/AgoraRTC_N-4.11.0.js"></script>
    <script src="js/agora-rtm-sdk-1.4.4.js"></script>
    <script>
      const APP_ID = "3c19963cb8ca48228834ee38bee6e70f";
      let testUID = String(Date.now());

      function log(message, type = "info") {
        const statusDiv = document.getElementById("status");
        const consoleDiv = document.getElementById("console");

        const statusClass =
          type === "error" ? "error" : type === "success" ? "success" : "info";
        statusDiv.innerHTML = `<div class="status ${statusClass}">${message}</div>`;

        const timestamp = new Date().toLocaleTimeString();
        consoleDiv.innerHTML += `[${timestamp}] ${message}<br>`;
        consoleDiv.scrollTop = consoleDiv.scrollHeight;

        console.log(message);
      }

      async function testConnection() {
        try {
          log("🔄 Testing Agora SDK loading...");

          if (typeof AgoraRTC === "undefined") {
            log("❌ AgoraRTC SDK not loaded!", "error");
            return;
          }

          if (typeof AgoraRTM === "undefined") {
            log("❌ AgoraRTM SDK not loaded!", "error");
            return;
          }

          log("✅ Agora SDKs loaded successfully", "success");

          log("🔄 Testing RTC client creation...");
          const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
          log("✅ RTC client created successfully", "success");

          log("🔄 Testing RTM client creation...");
          const rtmClient = await AgoraRTM.createInstance(APP_ID);
          log("✅ RTM client created successfully", "success");

          log("🔄 Testing RTM login...");
          await rtmClient.login({ uid: testUID, token: null });
          log("✅ RTM login successful!", "success");

          log("🔄 Testing RTC channel join...");
          await client.join(APP_ID, "test-room", null, testUID);
          log("✅ RTC channel join successful!", "success");

          log("🔄 Cleaning up...");
          await rtmClient.logout();
          await client.leave();
          log("✅ All tests passed! Agora is working correctly.", "success");
        } catch (error) {
          log(`❌ Error: ${error.message}`, "error");
          console.error("Full error:", error);

          if (error.message.includes("INVALID_APP_ID")) {
            log(
              "💡 The App ID might be expired or invalid. Try creating a new project at console.agora.io",
              "error"
            );
          } else if (error.message.includes("network")) {
            log(
              "💡 Network issue detected. Check your internet connection or firewall settings.",
              "error"
            );
          }
        }
      }

      async function testCamera() {
        try {
          log("🔄 Testing camera and microphone access...");

          const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true,
          });

          log("✅ Camera and microphone access granted!", "success");

          // Stop the stream
          stream.getTracks().forEach((track) => track.stop());
        } catch (error) {
          log(`❌ Camera/Microphone Error: ${error.message}`, "error");

          if (error.name === "NotAllowedError") {
            log(
              "💡 Permission denied. Please allow camera/microphone access in browser settings.",
              "error"
            );
          } else if (error.name === "NotFoundError") {
            log(
              "💡 No camera/microphone found. Check your device connections.",
              "error"
            );
          }
        }
      }

      // Auto-run basic test
      window.onload = () => {
        log("🚀 Page loaded. Ready to test!");
        setTimeout(testConnection, 1000);
      };
    </script>
  </body>
</html>
